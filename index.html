<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-64.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <!-- interactive-widget=resizes-content (found live via debug
         instrumentation, #156 follow-up): in standalone PWA mode
         specifically -- not a plain Safari tab -- focusing a text input
         and opening the keyboard was making iOS misreport
         window.innerWidth/layout-viewport width as much wider than the
         real screen (e.g. 483 instead of the true 393), while elements
         sized off the real screen (like <main>) stayed correct --
         leaving a strip of unaccounted blank page canvas on the right.
         This meta value tells iOS 17.4+ to resize the viewport for the
         keyboard instead of whatever its own default (buggy, in
         standalone mode) behavior was doing. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#3e7688" />
    <!-- iOS home-screen shortcut (#103) — without these, "Add to Home
         Screen" falls back to a generic gray-tile icon and an unspaced,
         truncated title derived from <title> below. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Turtle Steps" />
    <title>Turtle Steps to the Goal</title>
    <script>
      // Pre-paint theme application (issue #17): mirrors src/stores/themeStore.ts's
      // applyTheme()/defaults, duplicated here in plain JS since this must run
      // before the bundled JS loads, to avoid a flash of the wrong mood/scheme.
      ;(function () {
        var MOODS = ['pond', 'dusk', 'sage', 'tortoise', 'lagoon']
        var mood = 'pond'
        var colorScheme = window.matchMedia('(prefers-color-scheme: dark)')
          .matches
          ? 'dark'
          : 'light'
        try {
          var stored = JSON.parse(localStorage.getItem('turtle-steps-theme'))
          var state = stored && stored.state
          if (state && MOODS.indexOf(state.mood) !== -1) mood = state.mood
          if (
            state &&
            (state.colorScheme === 'light' || state.colorScheme === 'dark')
          ) {
            colorScheme = state.colorScheme
          }
        } catch (e) {
          // Corrupted/blocked storage — fall back to the defaults above.
        }
        document.documentElement.dataset.mood = mood
        document.documentElement.classList.toggle(
          'dark',
          colorScheme === 'dark',
        )
      })()
    </script>
    <style>
      /* Initial-load spinner (#102) — pure CSS, no JS coordination needed:
         #root:empty only matches before React has rendered anything into
         it, so this disappears the instant the app mounts. Colors are a
         plain approximation of the pond mood tokens (light/dark), since
         index.css hasn't loaded yet at this point. */
      #root:empty::before {
        content: '';
        display: block;
        width: 32px;
        height: 32px;
        margin: 40vh auto;
        border-radius: 50%;
        border: 3px solid #d8e2e4;
        border-top-color: #3e7688;
        animation: turtle-steps-spin 0.8s linear infinite;
      }
      html.dark #root:empty::before {
        border-color: #2a3a3f;
        border-top-color: #85bfce;
      }
      @keyframes turtle-steps-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
